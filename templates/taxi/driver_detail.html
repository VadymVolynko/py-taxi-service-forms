{% extends "base.html" %}
{% block content %}
  <h1>Driver: {{ driver.username }}</h1>
  <p>
    {{ driver.first_name }} {{ driver.last_name }}
  </p>
  <h2>Cars</h2>
  <hr>
  <ul>
    {% for car in driver.cars.all %}
      <li>{{ car.model }} ({{ car.manufacturer.name }})</li>
    {% endfor %}
  </ul>
{% endblock %}
